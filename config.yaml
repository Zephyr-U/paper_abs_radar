date_range:
  from: "2026-01-01"
  to: "2026-05-23"

output:
  dir: "output"
  markdown_filename: "paper_metadata.md"
  csv_filename: "papers.csv"
  json_filename: "papers.json"

journals:
  ieee:
    - name: "IEEE Journal of Solid-State Circuits"
      short: "JSSC"
      issn: "0018-9200"
    - name: "IEEE Solid-State Circuits Letters"
      short: "JSSC-L"
      issn: "2573-9603"
    - name: "IEEE Transactions on Biomedical Circuits and Systems"
      short: "TBioCAS"
      issn: "1932-4545"
  nature:
    - name: "Nature Sensors"
      short: "Nature Sensors"
      issn: "3059-4499"
    - name: "Nature Biomedical Engineering"
      short: "Nature BME"
      issn: "2157-846X"

keywords:
  positive:
    - implantable
    - biomedical
    - bioelectronics
    - RF
    - wireless power
    - backscatter
    - telemetry
    - SoC
    - ASIC
    - analog front-end
    - ultrasound
    - temperature sensor
    - voltage reference
    - bandgap
    - rectifier
    - wake-up receiver
    - neural
    - antenna
  negative:
    - machine learning only
    - review
    - editorial
    - correction
